<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkMate - iOS Style Subject Trace Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #007AFF;
            --primary-glow: #86c1ff;
            --primary-light: rgba(0, 122, 255, 0.15);
            --surface: #ffffff;
            --background: #f5f5f7;
            --text-dark: #1d1d1f;
            --text-muted: #86868b;
            --border: #e5e5ea;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text-dark);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        .map-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('pakenham-map-bg.jpg');
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        /* SVG Overlays */
        .map-svg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Base Area (Hidden until trace finishes) */
        #zoneAreaFill {
            fill: var(--primary-light);
            opacity: 0;
            transition: opacity 0.5s ease-out, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: 50% 50%;
        }

        /* The Glow Trace Lines */
        .trace-path {
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            opacity: 0;
        }

        /* Thick outer glow */
        #outerGlow {
            stroke: var(--primary-glow);
            stroke-width: 12;
            filter: url(#glowFilter);
        }

        /* Bright core line */
        #innerCore {
            stroke: #ffffff;
            stroke-width: 3;
            filter: url(#brightFilter);
        }

        /* Animation States */
        .is-tracing #outerGlow, 
        .is-tracing #innerCore {
            opacity: 1;
            animation: tracePath 1.2s cubic-bezier(0.445, 0.05, 0.55, 0.95) forwards;
        }

        /* Lift peak effect */
        .is-lifted #zoneAreaFill {
            opacity: 1;
            animation: subjectLift 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .is-lifted #outerGlow,
        .is-lifted #innerCore {
            opacity: 0;
            transition: opacity 0.4s ease-out;
        }

        @keyframes tracePath {
            from { stroke-dashoffset: 1000; }
            to { stroke-dashoffset: 0; }
        }

        @keyframes subjectLift {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.03); filter: brightness(1.4) drop-shadow(0 0 20px rgba(0,122,255,0.4)); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        /* Pin with haptic-like feel */
        .pin-container {
            position: absolute;
            top: 45%;
            left: 55%;
            transform: translate(-50%, -100%);
            z-index: 20;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.1s ease;
        }

        .pin-container:active {
            transform: translate(-50%, -100%) scale(0.9);
        }

        .pin {
            width: 48px;
            height: 48px;
            background-color: var(--primary);
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
        }

        .pin::after {
            content: '';
            width: 18px;
            height: 18px;
            background-color: white;
            border-radius: 50%;
            position: absolute;
        }

        .pulse-ring {
            position: absolute;
            width: 48px;
            height: 48px;
            background-color: var(--primary);
            border-radius: 50%;
            bottom: -24px;
            z-index: -1;
            opacity: 0.4;
            animation: pulse-ring 2s infinite ease-out;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.6); opacity: 0.6; }
            100% { transform: scale(2.2); opacity: 0; }
        }

        /* Modal styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
            transform: translateY(60px) scale(0.9);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            overflow: hidden;
            padding: 30px;
        }

        .modal-overlay.active .modal {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .modal-tag {
            display: inline-block;
            padding: 4px 12px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .info-label {
            color: var(--text-muted);
            font-size: 14px;
        }

        .info-value {
            font-weight: 600;
            font-size: 14px;
        }

        .park-button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, background 0.2s;
        }

        .park-button:active {
            transform: scale(0.97);
            background: #0066d6;
        }

        .close-hint {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 14px;
            opacity: 0.7;
        }

    </style>
</head>
<body>

    <div class="map-container" id="container">
        <!-- SVG for iOS Subject Lift Animation -->
        <svg class="map-svg-overlay" viewBox="0 0 1000 800" preserveAspectRatio="xMidYMid slice">
            <defs>
                <!-- Soft glow filter -->
                <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="8" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
                <!-- Sharp bright core filter -->
                <filter id="brightFilter" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="1.5" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>

            <!-- 1. The Area Fill (Subject) -->
            <polygon id="zoneAreaFill" points="300,380 620,380 620,700 580,700 580,420 300,420"/>

            <!-- 2. The Trace Paths (mimicking subject selection) -->
            <path id="outerGlow" class="trace-path" d="M 300 380 L 620 380 L 620 700 L 580 700 L 580 420 L 300 420 Z" />
            <path id="innerCore" class="trace-path" d="M 300 380 L 620 380 L 620 700 L 580 700 L 580 420 L 300 420 Z" />
        </svg>

        <!-- Parking Pin -->
        <div class="pin-container" id="parkingPin" style="top: 40%; left: 45%;">
            <div class="pin">
                <i data-lucide="parking-circle" style="color: white; transform: rotate(45deg); width: 24px; height: 24px;"></i>
            </div>
            <div class="pulse-ring"></div>
        </div>
    </div>

    <!-- Modal Form -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 class="modal-title">Downtown Zone A</h2>
            <span class="modal-tag">STREET PARKING</span>
            
            <div class="info-row">
                <span class="info-label">Hourly Rate</span>
                <span class="info-value">$5.50 / hr</span>
            </div>
            <div class="info-row">
                <span class="info-label">Max Duration</span>
                <span class="info-value">4 Hours</span>
            </div>
            <div class="info-row" style="border:none">
                <span class="info-label">Current Status</span>
                <span class="info-value" style="color: #34c759">Available Now</span>
            </div>

            <button class="park-button" onclick="resetDemo()">Select Parking</button>
        </div>
        <div class="close-hint">Tap anywhere to dismiss</div>
    </div>

    <script>
        lucide.createIcons();

        const pin = document.getElementById('parkingPin');
        const container = document.getElementById('container');
        const modalOverlay = document.getElementById('modalOverlay');
        
        const pathLength = 1300; // Adjusted for the path complexity
        document.querySelectorAll('.trace-path').forEach(p => {
            p.style.strokeDasharray = pathLength;
            p.style.strokeDashoffset = pathLength;
        });

        pin.addEventListener('click', () => {
            startTrace();
        });

        function startTrace() {
            container.classList.remove('is-lifted');
            container.classList.add('is-tracing');

            setTimeout(() => {
                container.classList.remove('is-tracing');
                container.classList.add('is-lifted');
                
                setTimeout(() => {
                    modalOverlay.classList.add('active');
                }, 400); 
            }, 1200);
        }

        modalOverlay.addEventListener('click', (e) => {
            if(e.target === modalOverlay) {
                resetDemo();
            }
        });

        function resetDemo() {
            modalOverlay.classList.remove('active');
            setTimeout(() => {
                container.classList.remove('is-lifted', 'is-tracing');
            }, 400);
        }
    </script>
</body>
</html>
